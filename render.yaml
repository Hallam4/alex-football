services:
  - type: web
    name: alex-football-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"

  - type: web
    name: alex-football-ui
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l $PORT
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
